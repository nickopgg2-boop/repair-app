<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบแจ้งซ่อมมือถือ</title>
    <link rel="stylesheet" href="style.css">
<<link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="แจ้งซ่อม">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <header>
        <h1>ระบบแจ้งซ่อม</h1>
    </header>

    <main>
        <section class="dashboard">
            <div class="dash-card bg-blue">
                <span class="dash-title">📥 งานเข้า</span>
                <span class="dash-number" id="count-total">0</span>
            </div>
            <div class="dash-card bg-orange">
                <span class="dash-title">⏳ งานค้าง</span>
                <span class="dash-number" id="count-pending">0</span>
            </div>
            <div class="dash-card bg-green">
                <span class="dash-title">✅ งานเสร็จ</span>
                <span class="dash-number" id="count-completed">0</span>
            </div>
        </section>

        <section id="job-list" class="job-list">
            </section>
    </main>

    <div class="bottom-bar">
        <button id="btn-open-modal" class="btn-primary btn-large">➕ เพิ่มใบงาน</button>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>เพิ่มใบงานใหม่</h2>
            <div class="form-group">
                <label for="job-type">เลือกประเภทงาน:</label>
                <select id="job-type" class="large-input">
                    <option value="S-D">S-D</option>
                    <option value="L-D">L-D</option>
                    <option value="P-D">P-D</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="btn-close-modal" class="btn-secondary">ยกเลิก</button>
                <button id="btn-save-job" class="btn-primary">บันทึก</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.error('Service Worker Error:', err));
            });
        }
    </script>
</body>
</html>
